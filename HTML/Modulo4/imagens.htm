<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Imagens</title>
</head>
<body>

<h1>Galeria de Imagens</h1>

<!-- Imagem 1 -->
<img src="img1.jpg" alt="Paisagem natural" width="400" height="250" loading="lazy" decoding="async">

<!-- Imagem 2 -->
<img src="img2.jpg" alt="Cidade à noite" width="400" height="250" loading="lazy" decoding="async">

<!-- Imagem 3 -->
<img src="img3.jpg" alt="Montanhas com neve" width="400" height="250" loading="lazy" decoding="async">

<!-- Figure com legenda -->
<figure>
<img src="grafico.png" alt="Gráfico de vendas" width="500" height="300" loading="lazy" decoding="async">
<figcaption>Evolução das vendas em 2025</figcaption>
</figure>

<!-- Imagem como link -->
<a href="galeria.html">
<img src="thumb.jpg" alt="Abrir galeria" width="200" height="120">
</a>

<!-- Imagem decorativa -->
<img src="decorativa.png" alt="" width="100" height="100">

</body>
</html>

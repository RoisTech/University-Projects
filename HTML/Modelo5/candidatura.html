<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Candidatura</title>
  </head>
  <body>
    <h1>Candidatura ao Curso</h1>

    <form action="#" method="post">
      <fieldset>
        <legend>Identificação</legend>

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required />

        <label for="nif">NIF</label>
        <input type="text" id="nif" name="nif" pattern="[0-9]{9}" required />

        <label for="data">Data de nascimento</label>
        <input type="date" id="data" name="data" />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="tel">Telefone</label>
        <input type="tel" id="tel" name="tel" />
      </fieldset>

      <fieldset>
        <legend>Curso</legend>

        <select name="curso">
          <optgroup label="TESP">
            <option>Programação</option>
          </optgroup>
          <optgroup label="Licenciatura">
            <option>Gestão</option>
          </optgroup>
        </select>
      </fieldset>

      <fieldset>
        <legend>Habilitações</legend>

        <input type="radio" name="nivel" value="sec" />
        Secundário

        <input type="radio" name="nivel" value="sup" />
        Superior

        <label for="media">Média</label>
        <input type="number" id="media" step="0.1" />
      </fieldset>

      <fieldset>
        <legend>Documentos</legend>

        <input type="file" accept=".pdf,.jpg" />
      </fieldset>

      <fieldset>
        <legend>Declarações</legend>

        <label>
          <input type="checkbox" required />
          Confirmo os dados
        </label>

        <label>
          <input type="checkbox" required />
          Aceito regulamento
        </label>
      </fieldset>

      <br />

      <button type="submit">Enviar</button>
    </form>
  </body>
</html>

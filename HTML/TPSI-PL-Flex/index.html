<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>FlexBox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
    <header>
        <div class="logotipo">
            <img src="img/flexbox.png" alt="logotipo da empresa" width="60", height="60">
            <p>Negócio</p>
        </div>
        <div>
            <ul class="links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contactos</a></li>
                <li><a href="#"><i class="fa-solid fa-arrow-right-to-bracket"></i></a></li>
            </ul>
        </div>
    </header>
    <main>
        <section class="banner">
            <img src="../img/banner.jpg" alt="Banner">
            <div class="titulo">
                <h1>Promoção de 50%</h1>
                <p>Aproveite a nossa promoção até ao dia 30 de Abril!</p>
            </div>
        </section>
        <section class="container">
            <h2>Produtos em Destaque</h2>
            <div class="cards">
                <div class="card">
                    <img src="../img/produtos/aspirador.png" alt="imagem do produto aspirador">
                    <p class="preco">&euro;179,00</p>
                    <p>Aspirador Robô IROBOT Roomba 105 Combo Auto Empty (Autonomia: 120 min - Preto)</p>
                    <button><i class="fa-solid fa-cart-shopping"></i> Adicionar ao Carrinho</button>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>

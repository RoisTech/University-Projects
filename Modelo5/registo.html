<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Registo</title>
  </head>

  <body>
    <h1>Registo de Utilizador</h1>

    <form action="#" method="post">
      <fieldset>
        <legend>Dados Pessoais</legend>

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required autocomplete="name" />

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          autocomplete="email"
        />

        <label for="data">Data de nascimento</label>
        <input type="date" id="data" name="data" />

        <label for="distrito">Distrito</label>
        <select id="distrito" name="distrito">
          <option>Lisboa</option>
          <option>Santarém</option>
          <option>Porto</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Credenciais</legend>

        <label for="user">Username</label>
        <input type="text" id="user" name="user" minlength="4" required />

        <label for="pass">Password</label>
        <input type="password" id="pass" name="pass" minlength="8" required />

        <label for="confirm">Confirmar Password</label>
        <input type="password" id="confirm" name="confirm" required />
      </fieldset>

      <fieldset>
        <legend>Preferências</legend>

        <input type="radio" id="emailpref" name="contacto" value="email" />
        <label for="emailpref">Email</label>

        <input type="radio" id="telpref" name="contacto" value="telefone" />
        <label for="telpref">Telefone</label>
      </fieldset>

      <label>
        <input type="checkbox" required />
        Aceito os termos
      </label>

      <br /><br />

      <button type="submit">Registar</button>

      <span id="erro-email" role="alert"></span>
    </form>
  </body>
</html>
